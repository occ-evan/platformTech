<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NEUROLINK — Brain-Controlled WiFi Headband</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="../css.css">

    <style>
        *{
            box-sizing: border-box;
        }

        body{
            overflow-x: hidden;
        }

        .contents{
            width: 100%;
            min-height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;

            padding: 120px 40px 60px;
            flex-wrap: wrap;
        }

        .viewProduct1,
        .viewProduct2{
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            border-radius: 24px;

            transition: 0.4s ease;
        }

        .viewProduct1{
            background-image: url("../images/viewProduct2.png");

            width: min(42vw, 555px);
            aspect-ratio: 555 / 350;

            transform: rotate(-4deg);
        }

        .viewProduct2{
            background-image: url("../images/viewProduct1.png");

            width: min(42vw, 540px);
            aspect-ratio: 540 / 400;

            transform: rotate(-12deg);
        }

        /* TABLET */
        @media (max-width: 1024px){

            .contents{
                gap: 30px;
                padding-top: 110px;
            }

            .viewProduct1,
            .viewProduct2{
                width: 75%;
                max-width: 520px;
            }

            .viewProduct2{
                transform: rotate(-7deg);
            }
        }

        /* MOBILE */
        @media (max-width: 768px){

            .contents{
                flex-direction: column;
                gap: 20px;

                padding:
                    100px 20px 40px;
            }

            .viewProduct1,
            .viewProduct2{
                width: 100%;
                max-width: 100%;
            }

            .viewProduct1{
                transform: rotate(-2deg);
            }

            .viewProduct2{
                transform: rotate(-4deg);
            }
        }

        /* SMALL MOBILE */
        @media (max-width: 480px){

            .contents{
                padding-inline: 14px;
            }

            .viewProduct1,
            .viewProduct2{
                border-radius: 18px;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
<div class="navContainer">
    <nav class="navbar">

        <a href="../index.html" class="logo">NEUROLINK</a>

        <div class="nav-links" id="navLinks">
            <a href="../index.html">HOME</a>
            <a href="features.html">FEATURES</a>
            <a href="technology.html">TECHNOLOGY</a>
            <a href="support.html">SUPPORT</a>
        </div>

        <!-- MOBILE MENU BUTTON -->
        <div class="menu-toggle" id="menuToggle">
            ☰
        </div>

    </nav>
</div>

    <div class="contents fade-section">
        <div class="viewProduct1"></div>
        <div class="viewProduct2"></div>
    </div>

</body>
</html>

<script>
const sections = document.querySelectorAll('.fade-section');

const observer = new IntersectionObserver((entries)=>{
    entries.forEach((entry)=>{
        if(entry.isIntersecting){
            entry.target.classList.add('show');
        } else {
            entry.target.classList.remove('show');
        }
    });
},{
    threshold: 0.2
});

sections.forEach((section)=>{
    observer.observe(section);
});

const menuToggle = document.getElementById('menuToggle');
const navLinks = document.getElementById('navLinks');

menuToggle.addEventListener('click', () => {
    navLinks.classList.toggle('show');
});

</script>
